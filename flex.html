<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="flex.css">
</head>
<div>
    <header class="ms-header" style="width: 100%">
  <div class="header-left">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a7/Microsoft_Store.svg/1200px-Microsoft_Store.svg.png" alt="MS Store" class="logo-icon">
    <span class="brand-name">Microsoft Store</span>
  </div>

  <div class="header-center">
    <div class="search-container">
      <input type="text" placeholder="Search apps, games, and more">
      <button class="search-btn">
        <svg viewBox="0 0 24 24" width="16" height="16"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" fill="currentColor"/></svg>
      </button>
    </div>
  </div>

  <div class="header-right">
    <div class="profile-circle">VS</div>
    <div class="stats">
      <span class="stat-item">FPS <strong>N/A</strong></span>
      <span class="stat-item">LAT <strong>N/A</strong></span>
    </div>
  </div>
</header>
<div id="align">
<nav class="side-nav">
  <div class="nav-group top">
    <a href="#" class="nav-item active">
      <i class="icon home-icon"></i>
      <span>Home</span>
    </a>
    <a href="#" class="nav-item">
      <i class="icon apps-icon"></i>
      <span>Apps</span>
    </a>
    <a href="#" class="nav-item">
      <i class="icon gaming-icon"></i>
      <span>Gaming</span>
    </a>
    <a href="#" class="nav-item">
      <i class="icon themes-icon"></i>
      <span>Themes</span>
    </a>
  </div>

  <div class="nav-group bottom">
    <a href="#" class="nav-item">
      <i class="icon news-icon"></i>
      <span>What's New</span>
    </a>
    <a href="#" class="nav-item">
      <i class="icon download-icon"></i>
      <span>Downloads</span>
      <span class="notification-dot"></span>
    </a>
    <a href="#" class="nav-item">
      <i class="icon library-icon"></i>
      <span>Library</span>
    </a>
  </div>
</nav>
</div>
<div class="main-container">
  <div class="hero-box"></div>

  <div class="side-stack">
    <div class="medium-box"></div>
    
    <div class="bottom-row">
      <div class="small-box"></div>
      <div class="small-box"></div>
    </div>
  </div>
</div>
</body>
</html>
