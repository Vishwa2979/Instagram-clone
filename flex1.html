<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <link rel="stylesheet" href="flex1.css">
</head>
<body>

    <div class="app-container">
        <nav class="side-nav">
            <div class="group-top">
                <div class="icon active">🏠</div>
                <div class="icon">▦</div>
                <div class="icon">🎮</div>
                <div class="icon">🎨</div>
            </div>
            <div class="group-bottom">
                <div class="icon">🔔</div>
                <div class="icon">📥</div>
                <div class="icon">📚</div>
            </div>
        </nav>

        <main class="main-viewport">
            
            <section class="top-row">
                <div class="hero-block"></div>
                
                <div class="side-container">
                    <div class="side-tall"></div>
                    <div class="side-split-row">
                        <div class="side-small"></div>
                        <div class="side-small"></div>
                    </div>
                </div>
            </section>

            <section class="bottom-row">
                <div class="footer"></div>
                <div class="footer"></div>
                <div class="footer"></div>
                <div class="footer"></div>
            </section>

        </main>
    </div>

</body>
</html>
