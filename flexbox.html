<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microsoft Store Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="ms-header">
        <div class="header-left">
            <div class="ms-logo"></div>
            <span class="brand-name">Microsoft Store</span>
        </div>
        <div class="header-center">
            <div class="search-container">
                <input type="text" placeholder="Search apps, games, and more">
                <span class="search-icon">🔍</span>
            </div>
        </div>
        <div class="header-right">
            <div class="profile-circle">VS</div>
            <div class="stats">
                <span>FPS <strong>N/A</strong></span>
                <span>LAT <strong>N/A</strong></span>
            </div>
        </div>
    </header>

    <div class="app-body">
        <nav class="side-nav">
            <div class="nav-group top">
                <div class="nav-item active">
                    <div class="icon home"></div>
                    <span>Home</span>
                </div>
                <div class="nav-item">
                    <div class="icon apps"></div>
                    <span>Apps</span>
                </div>
                <div class="nav-item">
                    <div class="icon gaming"></div>
                    <span>Gaming</span>
                </div>
                <div class="nav-item">
                    <div class="icon themes"></div>
                    <span>Themes</span>
                </div>
            </div>
            <div class="nav-group bottom">
                <div class="nav-item">
                    <div class="icon news"></div>
                    <span>What's New</span>
                </div>
                <div class="nav-item">
                    <div class="icon download"></div>
                    <div class="dot"></div>
                    <span>Downloads</span>
                </div>
                <div class="nav-item">
                    <div class="icon library"></div>
                    <span>Library</span>
                </div>
            </div>
        </nav>

        <main class="content-area">
            <div class="box-container">
                <div class="hero-box"></div>
                <div class="right-column">
                    <div class="medium-box"></div>
                    <div class="bottom-row">
                        <div class="small-box"></div>
                        <div class="small-box"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
